{% extends 'home/base.html' %}
{% load static %}

{% block content %}
<style>
	.home-page {
		min-height: calc(100vh - 72px);
		display: flex;
		align-items: center;
		justify-content: center;
		padding: 48px 24px;
		background: linear-gradient(180deg, #f7f9fc 0%, #eef4ef 100%);
	}

	.home-list {
		width: min(760px, 100%);
		display: grid;
		gap: 22px;
	}

	.university-row {
		display: flex;
		align-items: center;
		gap: 22px;
		padding: 22px 26px;
		border-radius: 18px;
		background: rgba(255, 255, 255, 0.9);
		box-shadow: 0 10px 30px rgba(21, 33, 44, 0.08);
		border: 1px solid rgba(22, 138, 69, 0.08);
		font-size: 30px;
		font-weight: 700;
	}

	.university-link {
		display: flex;
		align-items: center;
		width: 100%;
		height: 100%;
		text-decoration: none;
		color: inherit;
		transition: transform 0.2s ease, opacity 0.2s ease;
	}

	.university-link:hover {
		transform: scale(1.04);
		opacity: 0.92;
	}

	.university-logo {
		width: 96px;
		height: 96px;
		object-fit: contain;
		display: block;
	}

	.university-name {
		color: #17324d;
		line-height: 1.1;
	}

	.page-title {
		margin-bottom: 22px;
		text-align: center;
		font-size: 16px;
		font-weight: 700;
		letter-spacing: 0.16em;
		text-transform: uppercase;
		color: #168a45;
	}
</style>

<section class="home-page">
	<div class="home-list">
		<div class="page-title">Search Past Papers Of...</div>

		<a class="university-row university-link" href="{% url 'search' %}?university=FAST University">
			<img class="university-logo" src="{% static 'FAST.png' %}" alt="FAST University logo">
			<span class="university-name">FAST University</span>
		</a>

		<a class="university-row university-link" href="{% url 'search' %}?university=Sir Syed University">
			<img class="university-logo" src="{% static 'SSUET.png' %}" alt="SSUET University logo">
			<span class="university-name">Sir Syed University</span>
		</a>
	</div>
</section>
{% endblock %}
